<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1" />
    <meta name="theme-color" content="#05060A" />
    <title>RedLife Entertainment</title>
    <meta
      name="description"
      content="RedLife Entertainment — Turning imagination into interactive worlds. A scroll-driven 3D portfolio of 3D art, real-time graphics, and technical creative work by FalseMSP."
    />
    <meta name="author" content="RedLife Entertainment" />

    <!-- Favicon — relative paths so they work on GitHub Pages sub-paths.
         Vite rewrites /src/main.tsx automatically based on `base`, but
         public/ assets in index.html need relative paths (no leading slash). -->
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="apple-touch-icon" href="favicon.svg" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="RedLife Entertainment — 3D Artist · Developer · Technical Creator" />
    <meta
      property="og:description"
      content="Turning imagination into interactive worlds. A scroll-driven 3D portfolio."
    />
    <meta property="og:site_name" content="RedLife Entertainment" />
    <meta property="og:url" content="https://redlife.studio" />
    <meta property="og:image" content="https://redlife.studio/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="RedLife Entertainment — scroll-driven 3D portfolio" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="RedLife Entertainment" />
    <meta name="twitter:description" content="Turning imagination into interactive worlds." />
    <meta name="twitter:image" content="https://redlife.studio/og-image.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
